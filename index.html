<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧹 卫生值日</title>
<style>
  :root {
    --c-bg: #0f0c29;
    --c-card: #ffffff;
    --c-title: #1e1b4b;
    --c-gs: #6366f1;
    --c-gm: #8b5cf6;
    --c-ge: #a855f7;
    --c-ibg: #f5f3ff;
    --c-tbg: #ede9fe;
    --c-tname: #4c1d95;
    --c-subtle: #6b7280;
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--c-bg);
    background-image: linear-gradient(125deg,
      var(--c-gs), var(--c-gm), var(--c-ge), var(--c-gm), var(--c-gs));
    background-size: 300% 300%;
    animation: aurora-flow 14s ease-in-out infinite;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 极光模糊光团层 ───────────── */
  body::before {
    content: "";
    position: fixed; inset: -25%;
    background:
      radial-gradient(circle at 30% 30%, var(--c-ge), transparent 42%),
      radial-gradient(circle at 70% 65%, var(--c-gs), transparent 42%);
    filter: blur(70px);
    opacity: .45;
    z-index: -1;
    pointer-events: none;
    animation: aurora-drift 22s ease-in-out infinite alternate;
  }
  @keyframes aurora-flow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes aurora-drift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(4%, -3%) scale(1.08); }
    100% { transform: translate(-3%, 4%) scale(1.04); }
  }

  /* ── Card ─────────────────────── */
  .card {
    background: var(--c-card);
    border-radius: 18px;
    padding: 22px;
    width: 100%;
    max-width: 420px;
    box-shadow:
      0 20px 50px -12px rgba(76,29,149,.40),
      0 0 0 1px rgba(139,92,246,.14);
    position: relative;
    overflow: hidden;
  }
  .card::before { display: none; }

  /* header */
  .card-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 18px;
    position: relative;
    z-index: 2;
  }
  .card-header .icon {
    font-size: 30px;
    filter: none;
  }
  .card-header h1 {
    font-size: 28px;
    font-weight: 800;
    color: var(--c-title);
    letter-spacing: 2px;
  }

  /* ── Today hero ───────────────── */
  .today-box {
    position: relative;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 14px;
    background: #f5f3ff;
    border: 1px solid rgba(139,92,246,.12);
    border-left: 4px solid var(--c-gs);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 14px;
    color: var(--c-title);
    box-shadow: none;
    z-index: 1;
  }
  .today-box::before,
  .today-box::after { display: none; }
  .today-label {
    font-size: 16px; font-weight: 700;
    color: #6d28d9; opacity: 1; letter-spacing: 0;
    margin-bottom: 4px;
    text-transform: none;
  }
  .today-person {
    font-size: 34px; font-weight: 700;
    color: #4c1d95;
    letter-spacing: 0; line-height: 1.25;
    text-shadow: none;
  }
  .today-date {
    font-size: 12px; opacity: 1;
    margin-top: 0; font-weight: 500;
    color: #7c3aed;
    text-align: right;
  }

  /* ── List ─────────────────────── */
  .list { margin-top: 8px; position: relative; z-index: 2; }
  .list .row {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 11px 0;
    border-radius: 0;
    margin-bottom: 0;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(139,92,246,.08);
    transition: background .15s;
  }
  .list .row:hover {
    background: rgba(245,243,255,.6);
  }
  .list .row .tag {
    width: auto;
    font-size: 13px;
    font-weight: 600;
    color: var(--c-subtle);
    text-align: left;
    letter-spacing: .5px;
  }
  .list .row .date {
    flex: none; text-align: left;
    font-size: 13px; color: #6b7280;
    font-weight: 500;
  }
  .list .row .names {
    width: auto; text-align: right;
    font-size: 14px; font-weight: 600;
    color: #4b5563; line-height: 1.5;
  }

  .list .row.today {
    background: transparent;
    box-shadow: none;
    padding: 11px 0;
    border: none;
    border-bottom: 1px solid rgba(139,92,246,.25);
  }
  .list .row.today .tag { color: #6d28d9; font-weight: 700; font-size: 14px; }
  .list .row.today .date { color: #7c3aed; font-weight: 600; }
  .list .row.today .names { color: var(--c-tname); font-weight: 800; font-size: 15px; }

  /* ── Footer ───────────────────── */
  .footer {
    margin-top: 18px;
    font-size: 11px;
    color: #6b7280;
    letter-spacing: 1px;
    position: relative; z-index: 2;
  }
  .badge {
    display: inline-block;
    background: rgba(139,92,246,.10);
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 11px;
    color: #7c3aed;
    margin-top: 6px;
    font-weight: 500;
    position: relative; z-index: 2;
  }

  /* ── Settings Button ──────────── */
  .settings-btn {
    position: fixed; top: 20px; right: 20px;
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: rgba(255,255,255,.85);
    color: #4c1d95; font-size: 18px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,.18);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: background .2s, transform .2s, color .2s, box-shadow .2s;
  }
  .settings-btn:hover {
    background: #ffffff;
    transform: scale(1.04);
    color: #6d28d9;
    box-shadow: 0 8px 22px rgba(0,0,0,.22);
  }

  /* ── Modal ────────────────────── */
  .modal-overlay {
    display: flex;
    align-items: center; justify-content: center;
    position: fixed; inset: 0; padding: 20px;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open {
    opacity: 1; pointer-events: auto;
  }
  .modal {
    background: #ffffff;
    border-radius: 24px;
    padding: 26px 22px 22px;
    width: 100%; max-width: 380px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 22px 60px rgba(0,0,0,.30);
    transform: translateY(8px);
    transition: transform .25s;
    scrollbar-width: thin;
    scrollbar-color: rgba(139,92,246,.25) transparent;
  }
  .modal::-webkit-scrollbar { width: 6px; }
  .modal::-webkit-scrollbar-track { background: transparent; margin: 8px 0; }
  .modal::-webkit-scrollbar-thumb {
    background: rgba(139,92,246,.25);
    border-radius: 99px;
    border: 1.5px solid #ffffff;
    background-clip: padding-box;
  }
  .modal::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,.4); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 {
    font-size: 18px; font-weight: 700;
    color: var(--c-title); margin-bottom: 18px;
    text-align: center; letter-spacing: 1px;
  }
  .modal .fg { margin-bottom: 10px; }
  .modal .fg label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500; color: #6b7280;
    margin-bottom: 4px;
  }
  .modal .fg label::before {
    content: ""; display: inline-block;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--dot, #ccc);
    flex-shrink: 0;
  }
  .modal input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 32px; height: 32px;
    border: none; border-radius: 50%;
    padding: 0; cursor: pointer; background: transparent;
    flex-shrink: 0;
  }
  .modal input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .modal input[type="color"]::-webkit-color-swatch {
    border: 2.5px solid rgba(255,255,255,.85);
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,.15), inset 0 1px 2px rgba(255,255,255,.3);
  }
  .modal input[type="color"]::-moz-color-swatch {
    border: 2.5px solid rgba(255,255,255,.85);
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,.15), inset 0 1px 2px rgba(255,255,255,.3);
  }
  .modal input[type="color"]:focus { outline: none; }
  .modal input[type="color"]:focus::-webkit-color-swatch {
    box-shadow: 0 0 0 3px rgba(139,92,246,.35), 0 2px 8px rgba(0,0,0,.15);
  }
  .color-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .color-card {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    padding: 10px 12px 10px 14px;
    border: 1px solid rgba(139,92,246,.10);
    border-radius: 14px;
    background: #f9f7ff;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .color-card:hover {
    border-color: rgba(139,92,246,.25);
    box-shadow: 0 2px 10px rgba(139,92,246,.10);
  }
  .color-card span {
    min-width: 0; flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
    font-weight: 600;
    color: #5b21b6;
  }
  .modal .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .modal .btn-row button {
    flex: 1; padding: 12px; border: none; border-radius: 14px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .modal .btn-row button:active { transform: scale(.97); }
  .modal .btn-save {
    background: var(--c-gs);
    color: #fff;
    box-shadow: 0 4px 14px rgba(99,102,241,.30);
  }
  .modal .btn-save:hover { box-shadow: 0 6px 18px rgba(99,102,241,.35); }
  .modal .btn-reset { background: #f3f0ff; color: #6b7280; }
  .modal .btn-reset:hover { background: #e9e5ff; }
  .modal .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #6d28d9;
    margin: 18px 0 10px;
    padding-top: 14px;
    border-top: 1px solid rgba(139,92,246,.12);
  }
  .modal .section-title:first-of-type {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }
  .modal .fg input[type="date"],
  .modal .fg input[type="text"],
  .modal .fg textarea,
  .modal .fg select {
    width: 100%;
    border: 1px solid rgba(139,92,246,.14);
    border-radius: 10px;
    padding: 10px 12px;
    font: inherit;
    font-size: 13px;
    color: #374151;
    background: #f9f7ff;
    outline: none;
    transition: border-color .15s;
  }
  .modal .fg textarea {
    min-height: 96px;
    resize: vertical;
    line-height: 1.5;
  }
  .modal .fg input[type="date"]:focus,
  .modal .fg input[type="text"]:focus,
  .modal .fg textarea:focus,
  .modal .fg select:focus {
    border-color: var(--c-gs);
  }
  .modal .hint {
    font-size: 11px;
    color: #9ca3af;
    line-height: 1.5;
    margin-top: -4px;
    margin-bottom: 10px;
  }
  .modal .btn-ghost {
    background: #ede9fe;
    color: #6d28d9;
    margin-top: 8px;
  }
  .modal .btn-ghost:hover { background: #ddd6fe; }

  /* ── 日历导出 ─────────────────── */
  .cal-export {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative; z-index: 2;
  }
  .cal-label {
    font-size: 11px; font-weight: 600; color: #6b7280;
    letter-spacing: 1px;
  }
  .cal-btns { display: flex; gap: 8px; }
  .cal-btns button {
    flex: 1; padding: 10px 0;
    border: 1px solid rgba(139,92,246,.18);
    border-radius: 12px;
    background: #f9f7ff; color: #6d28d9;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background .15s, transform .12s, box-shadow .15s;
  }
  .cal-btns button:hover { background: #ede9fe; box-shadow: 0 2px 10px rgba(139,92,246,.10); }
  .cal-btns button:active { transform: scale(.97); }

  @media (max-width: 420px) {
    .color-grid { grid-template-columns: 1fr; }
  }

  /* responsive */
  @media (max-width: 420px) {
    .card { padding: 20px 16px; border-radius: 16px; }
    .today-box { grid-template-columns: 1fr; gap: 8px; }
    .today-label { font-size: 14px; }
    .today-date { text-align: left; }
    .today-person { font-size: 30px; }
    .list .row { grid-template-columns: 42px 1fr auto; padding: 10px 0; }
    .list .row .names { width: auto; }
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --c-title: #e8e4ff;
      --c-ibg: rgba(255,255,255,.06);
      --c-tbg: rgba(139,92,246,.18);
      --c-tname: #c4b5fd;
      --c-subtle: #9389b5;
    }
    body {
      background-color: #0a0820;
    }
    body::before { opacity: .5; filter: blur(80px); }
    .card { background: rgba(30,27,46,.92); box-shadow: 0 18px 50px rgba(0,0,0,.42), 0 0 0 1px rgba(139,92,246,.18); }
    .today-box { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.08); border-left-color: var(--c-gs); }
    .today-label { color: #c4b5fd; }
    .today-date { color: #a78bfa; }
    .list .row { background: transparent; border-color: rgba(255,255,255,.06); }
    .list .row:hover { background: rgba(255,255,255,.04); }
    .list .row.today { background: transparent; border-color: rgba(139,92,246,.30); }
    .list .row.today .tag,
    .list .row.today .date { color: #c4b5fd; }
    .list .row.today .names { color: #ede9fe; }
    .list .row .date { color: #9389b5; }
    .list .row .names { color: #d8d5e8; }
    .footer, .badge { color: #9389b5; }
    .cal-label { color: #9389b5; }
    .cal-btns button {
      background: rgba(255,255,255,.05);
      border-color: rgba(139,92,246,.22);
      color: #c4b5fd;
    }
    .cal-btns button:hover { background: rgba(139,92,246,.14); }
    .settings-btn { background: rgba(30,27,46,.84); color: #c4b5fd; box-shadow: 0 6px 18px rgba(0,0,0,.34); }
    .settings-btn:hover { background: #2a2640; color: #c4b5fd; }
    .modal { background: #1e1c30; }
    .modal h2 { color: #e8e4ff; }
    .modal .fg label { color: #a78bfa; }
    .modal input[type="color"] { background: transparent; }
    .color-card {
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.06);
    }
    .color-card:hover {
      border-color: rgba(139,92,246,.35);
      box-shadow: 0 2px 10px rgba(139,92,246,.12);
    }
    .color-card span { color: #d8d5e8; }
    .modal::-webkit-scrollbar-thumb {
      background: rgba(196,181,253,.2);
      border-color: #1e1c30;
    }
    .modal::-webkit-scrollbar-thumb:hover { background: rgba(196,181,253,.35); }
    .modal { scrollbar-color: rgba(196,181,253,.2) transparent; }
    .modal .fg input[type="date"],
    .modal .fg input[type="text"],
    .modal .fg textarea,
    .modal .fg select {
      background: #2a2640;
      border-color: rgba(255,255,255,.10);
      color: #e8e4ff;
    }
    .modal .section-title {
      color: #c4b5fd;
      border-top-color: rgba(255,255,255,.10);
    }
    .modal .hint { color: #9389b5; }
    .modal .btn-ghost { background: #2a2640; color: #c4b5fd; }
    .modal .btn-ghost:hover { background: #34304f; }
    .modal .btn-reset { background: #2a2640; color: #c4b5fd; }
  }

  @media (prefers-reduced-motion: reduce) {
    body, body::before { animation: none; }
  }
</style>
</head>
<body>

<button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>⚙️ 设置</h2>
    <div class="section-title">排班设置</div>
    <div class="fg"><label style="--dot:#6366f1">起始日期</label><input type="date" id="schedule-start-date"></div>
    <div class="fg"><label style="--dot:#8b5cf6">当天值日组</label><select id="schedule-start-group"></select></div>
    <div class="fg"><label style="--dot:#a855f7">值日人员</label><textarea id="schedule-groups" placeholder="每行一组，两个人用逗号分隔&#10;康戬泰, 甘亦伦&#10;刘云腾, 刘峻承"></textarea></div>
    <div class="hint">每行代表一天轮到的一组，支持逗号、顿号、空格分隔；至少填写一组。</div>
    <button class="btn-save btn-ghost" onclick="resetSchedule()">↩ 恢复默认排班</button>

    <div class="section-title">颜色设置</div>
    <div class="color-grid">
      <label class="color-card"><span>背景色</span><input type="color" id="cl-bg"></label>
      <label class="color-card"><span>卡片底色</span><input type="color" id="cl-card"></label>
      <label class="color-card"><span>标题颜色</span><input type="color" id="cl-title"></label>
      <label class="color-card"><span>渐变起始</span><input type="color" id="cl-gs"></label>
      <label class="color-card"><span>渐变中间</span><input type="color" id="cl-gm"></label>
      <label class="color-card"><span>渐变结束</span><input type="color" id="cl-ge"></label>
      <label class="color-card"><span>列表背景</span><input type="color" id="cl-ibg"></label>
      <label class="color-card"><span>今日高亮</span><input type="color" id="cl-tbg"></label>
    </div>
    <div class="btn-row">
      <button class="btn-reset" onclick="resetColors()">↩ 默认颜色</button>
      <button class="btn-save" onclick="saveSettings()">✓ 保存全部</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header"><span class="icon">🧹</span><h1>卫生值日</h1></div>
  <div class="today-box" id="todayBox"></div>
  <div class="list" id="list"></div>
  <div class="footer">🔁 4组循环 · 最后两组轮完重新开始</div>
  <div class="badge" id="badge"></div>
  <div class="cal-export">
    <span class="cal-label">📅 导入手机日历</span>
    <div class="cal-btns">
      <button onclick="exportCalendar(7)">未来 7 天</button>
      <button onclick="exportCalendar(15)">未来 15 天</button>
      <button onclick="exportCalendar(30)">未来 1 个月</button>
    </div>
  </div>
</div>

<script>
(function() {
  let groups = [
    { label: "第1组", people: ["康戬泰", "甘亦伦"] },
    { label: "第2组", people: ["刘云腾", "刘峻承"] },
    { label: "第3组", people: ["杜春旺", "周诣"] },
    { label: "第4组", people: ["刘洋", "刘天洋"] }
  ];
  let start = new Date(2026,5,12);
  let startIdx = 2;
  const defaultGroups = groups.map(g => ({ label: g.label, people: [...g.people] }));
  const defaultStart = new Date(start);
  const defaultStartIdx = startIdx;
  const SCHEDULE_KEY = "ws_schedule";
  const today = new Date();
  today.setHours(0,0,0,0);

  const DAY_NAMES = ['日','一','二','三','四','五','六'];
  const DAYS = [
    { label: "前天", offset: -2 },
    { label: "昨天", offset: -1 },
    { label: "今天", offset: 0 },
    { label: "明天", offset: 1 },
    { label: "后天", offset: 2 }
  ];

  function getGroup(offset) {
    const d = new Date(today);
    d.setDate(d.getDate() + offset);
    const diff = Math.floor((d - start) / 86400000);
    const idx = ((startIdx + diff) % groups.length + groups.length) % groups.length;
    return { date: d, group: groups[idx] };
  }

  function formatDate(d) {
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${DAY_NAMES[d.getDay()]}`;
  }

  function toDateInputValue(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function parseDateInput(s) {
    const parts = s.split("-").map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function cloneGroups(list) {
    return list.map((g, i) => ({ label: g.label || `第${i + 1}组`, people: [...g.people] }));
  }

  function serializeGroups(list) {
    return list.map(g => g.people.join("、")).join("\n");
  }

  function parseGroups(text) {
    return text.split("\n")
      .map(line => line.trim())
      .filter(Boolean)
      .map((line, i) => ({
        label: `第${i + 1}组`,
        people: line.split(/[、,，]+/).map(name => name.trim()).filter(Boolean)
      }))
      .filter(g => g.people.length > 0);
  }

  function loadSchedule() {
    try {
      const saved = localStorage.getItem(SCHEDULE_KEY);
      if (!saved) return;
      const cfg = JSON.parse(saved);
      const savedGroups = Array.isArray(cfg.groups) ? parseGroups(serializeGroups(cfg.groups)) : [];
      if (savedGroups.length > 0 && cfg.startDate) {
        groups = savedGroups;
        start = parseDateInput(cfg.startDate);
        startIdx = Math.min(Math.max(Number(cfg.startIdx) || 0, 0), groups.length - 1);
      }
    } catch(e) {}
  }

  function formatPeople(people) {
    return people.map(name => name.trim()).filter(Boolean).join("<br>");
  }

  function render() {
    const r0 = getGroup(0);
    document.getElementById("todayBox").innerHTML =
      `<div class="today-label">🧹 今天轮到</div>` +
      `<div class="today-person">${formatPeople(r0.group.people)}</div>` +
      `<div class="today-date">${formatDate(r0.date)}</div>`;

    const html = DAYS.map(d => {
      const r = getGroup(d.offset);
      const cls = d.offset === 0 ? "row today" : "row";
      return `<div class="${cls}">
        <span class="tag">${d.label}</span>
        <span class="date">${r.date.getMonth()+1}月${r.date.getDate()}日 周${DAY_NAMES[r.date.getDay()]}</span>
        <span class="names">${formatPeople(r.group.people)}</span>
      </div>`;
    }).join("");

    document.getElementById("list").innerHTML = html;
    document.getElementById("badge").textContent =
      `🕐 ${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
    document.querySelector(".footer").textContent =
      `🔁 ${groups.length}组循环 · 轮完${groups[groups.length - 1].label}回${groups[0].label}`;
  }

  const defaultColors = {
    bg: "#0f0c29", card: "#ffffff", title: "#1e1b4b",
    gs: "#6366f1", gm: "#8b5cf6", ge: "#a855f7",
    ibg: "#f5f3ff", tbg: "#ede9fe"
  };

  const CSS_VARS = ["bg","card","title","gs","gm","ge","ibg","tbg"];
  const INPUT_IDS  = ["cl-bg","cl-card","cl-title","cl-gs","cl-gm","cl-ge","cl-ibg","cl-tbg"];

  function loadColors() {
    try {
      const s = localStorage.getItem("wc");
      if (s) return JSON.parse(s);
    } catch(e) {}
    return { ...defaultColors };
  }

  function applyColors(c) {
    const r = document.documentElement;
    r.style.setProperty("--c-bg", c.bg);
    r.style.setProperty("--c-card", c.card);
    r.style.setProperty("--c-title", c.title);
    r.style.setProperty("--c-gs", c.gs);
    r.style.setProperty("--c-gm", c.gm);
    r.style.setProperty("--c-ge", c.ge);
    r.style.setProperty("--c-ibg", c.ibg);
    r.style.setProperty("--c-tbg", c.tbg);
  }

  function popModal(c) {
    for (let i = 0; i < CSS_VARS.length; i++) {
      document.getElementById(INPUT_IDS[i]).value = c[CSS_VARS[i]];
    }
  }

  function getModalColors() {
    const c = {};
    for (let i = 0; i < CSS_VARS.length; i++) {
      c[CSS_VARS[i]] = document.getElementById(INPUT_IDS[i]).value;
    }
    return c;
  }

  function refreshStartGroupSelect(selected) {
    const sel = document.getElementById("schedule-start-group");
    const parsed = parseGroups(document.getElementById("schedule-groups").value);
    const source = parsed.length ? parsed : groups;
    sel.innerHTML = source.map((g, i) =>
      `<option value="${i}">${g.label}：${g.people.join("、")}</option>`
    ).join("");
    sel.value = Math.min(selected ?? startIdx, Math.max(source.length - 1, 0));
  }

  function popSchedule() {
    document.getElementById("schedule-start-date").value = toDateInputValue(start);
    document.getElementById("schedule-groups").value = serializeGroups(groups);
    refreshStartGroupSelect(startIdx);
  }

  function saveSchedule() {
    const nextGroups = parseGroups(document.getElementById("schedule-groups").value);
    if (nextGroups.length === 0) {
      alert("至少填写一组值日人员");
      return false;
    }
    const dateValue = document.getElementById("schedule-start-date").value;
    if (!dateValue) {
      alert("请选择起始日期");
      return false;
    }
    const nextStart = parseDateInput(dateValue);
    if (Number.isNaN(nextStart.getTime()) || toDateInputValue(nextStart) !== dateValue) {
      alert("请选择有效的起始日期");
      return false;
    }
    groups = nextGroups;
    start = nextStart;
    startIdx = Math.min(Number(document.getElementById("schedule-start-group").value) || 0, groups.length - 1);
    localStorage.setItem(SCHEDULE_KEY, JSON.stringify({
      groups: cloneGroups(groups),
      startDate: dateValue,
      startIdx
    }));
    return true;
  }

  window.saveSettings = function() {
    if (!saveSchedule()) return;
    const c = getModalColors();
    localStorage.setItem("wc", JSON.stringify(c));
    applyColors(c);
    render();
    document.getElementById("modal").classList.remove("open");
  };

  window.resetSchedule = function() {
    document.getElementById("schedule-start-date").value = toDateInputValue(defaultStart);
    document.getElementById("schedule-groups").value = serializeGroups(defaultGroups);
    refreshStartGroupSelect(defaultStartIdx);
  };

  window.saveColors = function() {
    const c = getModalColors();
    localStorage.setItem("wc", JSON.stringify(c));
    applyColors(c);
    document.getElementById("modal").classList.remove("open");
  };

  window.resetColors = function() {
    localStorage.removeItem("wc");
    applyColors(defaultColors);
    popModal(defaultColors);
  };

  document.getElementById("settingsBtn").addEventListener("click", () => {
    popSchedule();
    popModal(loadColors());
    document.getElementById("modal").classList.add("open");
  });
  document.getElementById("schedule-groups").addEventListener("input", () => {
    refreshStartGroupSelect(Number(document.getElementById("schedule-start-group").value) || 0);
  });
  document.getElementById("modal").addEventListener("click", (e) => {
    if (e.target === e.currentTarget) document.getElementById("modal").classList.remove("open");
  });

  /* ── 导出 .ics 日历文件 ───────── */
  function pad2(n) { return String(n).padStart(2, "0"); }
  function icsDate(d) {
    return `${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}`;
  }
  function icsStamp(d) {
    return `${d.getUTCFullYear()}${pad2(d.getUTCMonth()+1)}${pad2(d.getUTCDate())}T${pad2(d.getUTCHours())}${pad2(d.getUTCMinutes())}${pad2(d.getUTCSeconds())}Z`;
  }
  function escapeICS(s) {
    return s.replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\r?\n/g, "\\n");
  }
  function buildICS(days) {
    const lines = [
      "BEGIN:VCALENDAR", "VERSION:2.0",
      "PRODID:-//卫生值日//ZH//", "CALSCALE:GREGORIAN", "METHOD:PUBLISH"
    ];
    const stamp = icsStamp(new Date());
    for (let i = 0; i < days; i++) {
      const r = getGroup(i);
      const ds = r.date;
      const de = new Date(ds);
      de.setDate(de.getDate() + 1);
      const summary = `卫生值日：${r.group.people.join("、")}（${r.group.label}）`;
      lines.push(
        "BEGIN:VEVENT",
        `UID:ws-${icsDate(ds)}@weisheng-local`,
        `DTSTAMP:${stamp}`,
        `DTSTART;VALUE=DATE:${icsDate(ds)}`,
        `DTEND;VALUE=DATE:${icsDate(de)}`,
        `SUMMARY:${escapeICS(summary)}`,
        "END:VEVENT"
      );
    }
    lines.push("END:VCALENDAR");
    return lines.join("\r\n");
  }
  window.exportCalendar = function(days) {
    const labelMap = { 7: "7天", 15: "15天", 30: "1个月" };
    const blob = new Blob([buildICS(days)], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `卫生值日-${labelMap[days] || days + "天"}.ics`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  };

  loadSchedule();
  applyColors(loadColors());
  render();
})();
</script>
</body>
</html>
