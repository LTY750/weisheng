<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧹 卫生值日</title>
<style>
  :root {
    --c-bg: #f4f1ea;
    --c-card: #fffdf8;
    --c-title: #2f2a24;
    --c-gs: #5b8c74;
    --c-gm: #6f9f84;
    --c-ge: #86ad94;
    --c-ibg: #f7f2e8;
    --c-tbg: #e8f1e6;
    --c-tname: #2f5d46;
    --c-subtle: #9a8f80;
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--c-bg);
    background-image:
      radial-gradient(circle at 20% 15%, rgba(91,140,116,.10), transparent 26%),
      radial-gradient(circle at 85% 85%, rgba(180,132,89,.10), transparent 30%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Card ─────────────────────── */
  .card {
    background: var(--c-card);
    border-radius: 18px;
    padding: 22px;
    width: 100%;
    max-width: 420px;
    box-shadow:
      0 14px 34px rgba(66,52,36,.12),
      0 0 0 1px rgba(92,76,54,.08);
    position: relative;
    overflow: hidden;
  }
  .card::before { display: none; }

  /* header */
  .card-header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    margin-bottom: 16px;
    position: relative;
    z-index: 2;
  }
  .card-header .icon {
    font-size: 22px;
    filter: none;
  }
  .card-header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--c-title);
    letter-spacing: 0;
  }

  /* ── Today hero ───────────────── */
  .today-box {
    position: relative;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 14px;
    background: #f7f2e8;
    border: 1px solid rgba(88,72,50,.10);
    border-left: 4px solid var(--c-gs);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 14px;
    color: var(--c-title);
    box-shadow: none;
    z-index: 1;
  }
  .today-box::before,
  .today-box::after { display: none; }
  .today-label {
    font-size: 16px; font-weight: 700;
    color: #6e806f; opacity: 1; letter-spacing: 0;
    margin-bottom: 4px;
    text-transform: none;
  }
  .today-person {
    font-size: 34px; font-weight: 700;
    color: #2f5d46;
    letter-spacing: 0; line-height: 1.25;
    text-shadow: none;
  }
  .today-date {
    font-size: 12px; opacity: 1;
    margin-top: 0; font-weight: 500;
    color: #8d8478;
    text-align: right;
  }

  /* ── List ─────────────────────── */
  .list { margin-top: 8px; position: relative; z-index: 2; }
  .list .row {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 11px 0;
    border-radius: 0;
    margin-bottom: 0;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(88,72,50,.08);
    transition: background .15s;
  }
  .list .row:hover {
    background: rgba(247,242,232,.55);
  }
  .list .row .tag {
    width: auto;
    font-size: 13px;
    font-weight: 600;
    color: var(--c-subtle);
    text-align: left;
    letter-spacing: .5px;
  }
  .list .row .date {
    flex: none; text-align: left;
    font-size: 13px; color: #91877b;
    font-weight: 500;
  }
  .list .row .names {
    width: auto; text-align: right;
    font-size: 14px; font-weight: 600;
    color: #555; line-height: 1.5;
  }

  .list .row.today {
    background: transparent;
    box-shadow: none;
    padding: 11px 0;
    border: none;
    border-bottom: 1px solid rgba(91,140,116,.22);
  }
  .list .row.today .tag { color: #2f5d46; font-weight: 700; font-size: 14px; }
  .list .row.today .date { color: #3f6f56; font-weight: 600; }
  .list .row.today .names { color: var(--c-tname); font-weight: 800; font-size: 15px; }

  /* ── Footer ───────────────────── */
  .footer {
    margin-top: 18px;
    font-size: 11px;
    color: #a79c8d;
    letter-spacing: 1px;
    position: relative; z-index: 2;
  }
  .badge {
    display: inline-block;
    background: rgba(91,140,116,.10);
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 11px;
    color: #8d8478;
    margin-top: 6px;
    font-weight: 500;
    position: relative; z-index: 2;
  }

  /* ── Settings Button ──────────── */
  .settings-btn {
    position: fixed; top: 20px; right: 20px;
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: rgba(255,253,248,.82);
    color: #5f574d; font-size: 18px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(66,52,36,.12);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: background .2s, transform .2s, color .2s, box-shadow .2s;
  }
  .settings-btn:hover {
    background: #fffdf8;
    transform: scale(1.04);
    color: #2f5d46;
    box-shadow: 0 8px 22px rgba(66,52,36,.16);
  }

  /* ── Modal ────────────────────── */
  .modal-overlay {
    display: flex;
    align-items: center; justify-content: center;
    position: fixed; inset: 0; padding: 20px;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open {
    opacity: 1; pointer-events: auto;
  }
  .modal {
    background: #fffdf8;
    border-radius: 24px;
    padding: 26px 22px 22px;
    width: 100%; max-width: 380px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 22px 60px rgba(66,52,36,.22);
    transform: translateY(8px);
    transition: transform .25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 {
    font-size: 18px; font-weight: 700;
    color: var(--c-title); margin-bottom: 18px;
    text-align: center; letter-spacing: 1px;
  }
  .modal .fg { margin-bottom: 10px; }
  .modal .fg label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500; color: #6c6258;
    margin-bottom: 4px;
  }
  .modal .fg label::before {
    content: ""; display: inline-block;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--dot, #ccc);
    flex-shrink: 0;
  }
  .modal .fg input[type="color"] {
    width: 56px; height: 36px;
    border: none; border-radius: 12px;
    padding: 0; cursor: pointer; background: transparent;
  }
  .modal .fg input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .modal .fg input[type="color"]::-webkit-color-swatch {
    border: 2px solid rgba(255,255,255,.8);
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(15,12,41,.16);
  }
  .modal .fg input[type="color"]:focus { outline: 2px solid #8b5cf6; outline-offset: 2px; }
  .color-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .color-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-width: 0;
    padding: 10px 10px 10px 12px;
    border: 1px solid rgba(88,72,50,.08);
    border-radius: 16px;
    background: #fffaf0;
  }
  .color-card span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
    font-weight: 600;
    color: #645b50;
  }
  .modal .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .modal .btn-row button {
    flex: 1; padding: 12px; border: none; border-radius: 14px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .modal .btn-row button:active { transform: scale(.97); }
  .modal .btn-save {
    background: var(--c-gs);
    color: #fff;
    box-shadow: 0 4px 14px rgba(91,140,116,.28);
  }
  .modal .btn-save:hover { box-shadow: 0 6px 18px rgba(91,140,116,.32); }
  .modal .btn-reset { background: #f0eadf; color: #685d51; }
  .modal .btn-reset:hover { background: #e7dfd2; }
  .modal .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #2f5d46;
    margin: 18px 0 10px;
    padding-top: 14px;
    border-top: 1px solid rgba(88,72,50,.10);
  }
  .modal .section-title:first-of-type {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }
  .modal .fg input[type="date"],
  .modal .fg input[type="text"],
  .modal .fg textarea,
  .modal .fg select {
    width: 100%;
    border: 1px solid rgba(88,72,50,.12);
    border-radius: 10px;
    padding: 10px 12px;
    font: inherit;
    font-size: 13px;
    color: #51483f;
    background: #fffaf0;
    outline: none;
    transition: border-color .15s;
  }
  .modal .fg textarea {
    min-height: 96px;
    resize: vertical;
    line-height: 1.5;
  }
  .modal .fg input[type="date"]:focus,
  .modal .fg input[type="text"]:focus,
  .modal .fg textarea:focus,
  .modal .fg select:focus {
    border-color: var(--c-gs);
  }
  .modal .hint {
    font-size: 11px;
    color: #9ca3af;
    line-height: 1.5;
    margin-top: -4px;
    margin-bottom: 10px;
  }
  .modal .btn-ghost {
    background: #edf4ea;
    color: #2f5d46;
    margin-top: 8px;
  }
  .modal .btn-ghost:hover { background: #dfeadd; }

  @media (max-width: 420px) {
    .color-grid { grid-template-columns: 1fr; }
  }

  /* responsive */
  @media (max-width: 420px) {
    .card { padding: 20px 16px; border-radius: 16px; }
    .today-box { grid-template-columns: 1fr; gap: 8px; }
    .today-label { font-size: 14px; }
    .today-date { text-align: left; }
    .today-person { font-size: 30px; }
    .list .row { grid-template-columns: 42px 1fr auto; padding: 10px 0; }
    .list .row .names { width: auto; }
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --c-title: #eee8dc;
      --c-ibg: rgba(255,255,255,.06);
      --c-tbg: rgba(91,140,116,.18);
      --c-tname: #b9dcc7;
      --c-subtle: #938a7d;
    }
    body {
      background: #1c1b18;
      background-image:
        radial-gradient(circle at 15% 10%, rgba(91,140,116,.10), transparent 28%),
        radial-gradient(circle at 90% 90%, rgba(180,132,89,.07), transparent 30%);
    }
    .card { background: rgba(38,36,31,.94); box-shadow: 0 18px 50px rgba(0,0,0,.28); }
    .today-box { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.08); border-left-color: var(--c-gs); }
    .today-label { color: #9fb9a8; }
    .today-date { color: #91887d; }
    .list .row { background: transparent; border-color: rgba(255,255,255,.06); }
    .list .row:hover { background: rgba(255,255,255,.04); }
    .list .row.today { background: transparent; border-color: rgba(91,140,116,.30); }
    .list .row.today .tag,
    .list .row.today .date { color: #b9dcc7; }
    .list .row.today .names { color: #e9f6ed; }
    .list .row .date { color: #91887d; }
    .list .row .names { color: #d5cfc4; }
    .footer, .badge { color: #8e8578; }
    .settings-btn { background: rgba(38,36,31,.84); color: #ded6c8; box-shadow: 0 6px 18px rgba(0,0,0,.24); }
    .settings-btn:hover { background: #302e28; color: #b9dcc7; }
    .modal { background: #26241f; }
    .modal h2 { color: #eee8dc; }
    .modal .fg label { color: #c7beae; }
    .modal .fg input[type="color"] { background: transparent; }
    .color-card {
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.08);
    }
    .color-card span { color: #d7cec0; }
    .modal .fg input[type="date"],
    .modal .fg input[type="text"],
    .modal .fg textarea,
    .modal .fg select {
      background: #302e28;
      border-color: rgba(255,255,255,.10);
      color: #eee8dc;
    }
    .modal .section-title {
      color: #b9dcc7;
      border-top-color: rgba(255,255,255,.10);
    }
    .modal .hint { color: #928879; }
    .modal .btn-ghost { background: #2f3a31; color: #b9dcc7; }
    .modal .btn-ghost:hover { background: #354537; }
    .modal .btn-reset { background: #302e28; color: #cfc6b9; }
  }
</style>
</head>
<body>

<button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>⚙️ 设置</h2>
    <div class="section-title">排班设置</div>
    <div class="fg"><label style="--dot:#6366f1">起始日期</label><input type="date" id="schedule-start-date"></div>
    <div class="fg"><label style="--dot:#8b5cf6">当天值日组</label><select id="schedule-start-group"></select></div>
    <div class="fg"><label style="--dot:#a855f7">值日人员</label><textarea id="schedule-groups" placeholder="每行一组，两个人用逗号分隔&#10;康戬泰, 甘亦伦&#10;刘云腾, 刘峻承"></textarea></div>
    <div class="hint">每行代表一天轮到的一组，支持逗号、顿号、空格分隔；至少填写一组。</div>
    <button class="btn-save btn-ghost" onclick="resetSchedule()">↩ 恢复默认排班</button>

    <div class="section-title">颜色设置</div>
    <div class="color-grid">
      <label class="color-card"><span>背景色</span><input type="color" id="cl-bg"></label>
      <label class="color-card"><span>卡片底色</span><input type="color" id="cl-card"></label>
      <label class="color-card"><span>标题颜色</span><input type="color" id="cl-title"></label>
      <label class="color-card"><span>渐变起始</span><input type="color" id="cl-gs"></label>
      <label class="color-card"><span>渐变中间</span><input type="color" id="cl-gm"></label>
      <label class="color-card"><span>渐变结束</span><input type="color" id="cl-ge"></label>
      <label class="color-card"><span>列表背景</span><input type="color" id="cl-ibg"></label>
      <label class="color-card"><span>今日高亮</span><input type="color" id="cl-tbg"></label>
    </div>
    <div class="btn-row">
      <button class="btn-reset" onclick="resetColors()">↩ 默认颜色</button>
      <button class="btn-save" onclick="saveSettings()">✓ 保存全部</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header"><span class="icon">🧹</span><h1>卫生值日</h1></div>
  <div class="today-box" id="todayBox"></div>
  <div class="list" id="list"></div>
  <div class="footer">🔁 4组循环 · 最后两组轮完重新开始</div>
  <div class="badge" id="badge"></div>
</div>

<script>
(function() {
  let groups = [
    { label: "第1组", people: ["康戬泰", "甘亦伦"] },
    { label: "第2组", people: ["刘云腾", "刘峻承"] },
    { label: "第3组", people: ["杜春旺", "周诣"] },
    { label: "第4组", people: ["刘洋", "刘天洋"] }
  ];
  let start = new Date(2026,5,12);
  let startIdx = 2;
  const defaultGroups = groups.map(g => ({ label: g.label, people: [...g.people] }));
  const defaultStart = new Date(start);
  const defaultStartIdx = startIdx;
  const SCHEDULE_KEY = "ws_schedule";
  const today = new Date();
  today.setHours(0,0,0,0);

  const DAY_NAMES = ['日','一','二','三','四','五','六'];
  const DAYS = [
    { label: "前天", offset: -2 },
    { label: "昨天", offset: -1 },
    { label: "今天", offset: 0 },
    { label: "明天", offset: 1 },
    { label: "后天", offset: 2 }
  ];

  function getGroup(offset) {
    const d = new Date(today);
    d.setDate(d.getDate() + offset);
    const diff = Math.floor((d - start) / 86400000);
    const idx = ((startIdx + diff) % groups.length + groups.length) % groups.length;
    return { date: d, group: groups[idx] };
  }

  function formatDate(d) {
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${DAY_NAMES[d.getDay()]}`;
  }

  function toDateInputValue(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function parseDateInput(s) {
    const parts = s.split("-").map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function cloneGroups(list) {
    return list.map((g, i) => ({ label: g.label || `第${i + 1}组`, people: [...g.people] }));
  }

  function serializeGroups(list) {
    return list.map(g => g.people.join("、")).join("\n");
  }

  function parseGroups(text) {
    return text.split("\n")
      .map(line => line.trim())
      .filter(Boolean)
      .map((line, i) => ({
        label: `第${i + 1}组`,
        people: line.split(/[、,，]+/).map(name => name.trim()).filter(Boolean)
      }))
      .filter(g => g.people.length > 0);
  }

  function loadSchedule() {
    try {
      const saved = localStorage.getItem(SCHEDULE_KEY);
      if (!saved) return;
      const cfg = JSON.parse(saved);
      const savedGroups = Array.isArray(cfg.groups) ? parseGroups(serializeGroups(cfg.groups)) : [];
      if (savedGroups.length > 0 && cfg.startDate) {
        groups = savedGroups;
        start = parseDateInput(cfg.startDate);
        startIdx = Math.min(Math.max(Number(cfg.startIdx) || 0, 0), groups.length - 1);
      }
    } catch(e) {}
  }

  function formatPeople(people) {
    return people.map(name => name.trim()).filter(Boolean).join("<br>");
  }

  function render() {
    const r0 = getGroup(0);
    document.getElementById("todayBox").innerHTML =
      `<div class="today-label">🧹 今天轮到</div>` +
      `<div class="today-person">${formatPeople(r0.group.people)}</div>` +
      `<div class="today-date">${formatDate(r0.date)}</div>`;

    const html = DAYS.map(d => {
      const r = getGroup(d.offset);
      const cls = d.offset === 0 ? "row today" : "row";
      return `<div class="${cls}">
        <span class="tag">${d.label}</span>
        <span class="date">${r.date.getMonth()+1}月${r.date.getDate()}日 周${DAY_NAMES[r.date.getDay()]}</span>
        <span class="names">${formatPeople(r.group.people)}</span>
      </div>`;
    }).join("");

    document.getElementById("list").innerHTML = html;
    document.getElementById("badge").textContent =
      `🕐 ${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
    document.querySelector(".footer").textContent =
      `🔁 ${groups.length}组循环 · 轮完${groups[groups.length - 1].label}回${groups[0].label}`;
  }

  const defaultColors = {
    bg: "#f4f1ea", card: "#fffdf8", title: "#2f2a24",
    gs: "#5b8c74", gm: "#6f9f84", ge: "#86ad94",
    ibg: "#f7f2e8", tbg: "#e8f1e6"
  };

  const CSS_VARS = ["bg","card","title","gs","gm","ge","ibg","tbg"];
  const INPUT_IDS  = ["cl-bg","cl-card","cl-title","cl-gs","cl-gm","cl-ge","cl-ibg","cl-tbg"];

  function loadColors() {
    try {
      const s = localStorage.getItem("wc");
      if (s) return JSON.parse(s);
    } catch(e) {}
    return { ...defaultColors };
  }

  function applyColors(c) {
    const r = document.documentElement;
    r.style.setProperty("--c-bg", c.bg);
    r.style.setProperty("--c-card", c.card);
    r.style.setProperty("--c-title", c.title);
    r.style.setProperty("--c-gs", c.gs);
    r.style.setProperty("--c-gm", c.gm);
    r.style.setProperty("--c-ge", c.ge);
    r.style.setProperty("--c-ibg", c.ibg);
    r.style.setProperty("--c-tbg", c.tbg);
  }

  function popModal(c) {
    for (let i = 0; i < CSS_VARS.length; i++) {
      document.getElementById(INPUT_IDS[i]).value = c[CSS_VARS[i]];
    }
  }

  function getModalColors() {
    const c = {};
    for (let i = 0; i < CSS_VARS.length; i++) {
      c[CSS_VARS[i]] = document.getElementById(INPUT_IDS[i]).value;
    }
    return c;
  }

  function refreshStartGroupSelect(selected) {
    const sel = document.getElementById("schedule-start-group");
    const parsed = parseGroups(document.getElementById("schedule-groups").value);
    const source = parsed.length ? parsed : groups;
    sel.innerHTML = source.map((g, i) =>
      `<option value="${i}">${g.label}：${g.people.join("、")}</option>`
    ).join("");
    sel.value = Math.min(selected ?? startIdx, Math.max(source.length - 1, 0));
  }

  function popSchedule() {
    document.getElementById("schedule-start-date").value = toDateInputValue(start);
    document.getElementById("schedule-groups").value = serializeGroups(groups);
    refreshStartGroupSelect(startIdx);
  }

  function saveSchedule() {
    const nextGroups = parseGroups(document.getElementById("schedule-groups").value);
    if (nextGroups.length === 0) {
      alert("至少填写一组值日人员");
      return false;
    }
    const dateValue = document.getElementById("schedule-start-date").value;
    if (!dateValue) {
      alert("请选择起始日期");
      return false;
    }
    const nextStart = parseDateInput(dateValue);
    if (Number.isNaN(nextStart.getTime()) || toDateInputValue(nextStart) !== dateValue) {
      alert("请选择有效的起始日期");
      return false;
    }
    groups = nextGroups;
    start = nextStart;
    startIdx = Math.min(Number(document.getElementById("schedule-start-group").value) || 0, groups.length - 1);
    localStorage.setItem(SCHEDULE_KEY, JSON.stringify({
      groups: cloneGroups(groups),
      startDate: dateValue,
      startIdx
    }));
    return true;
  }

  window.saveSettings = function() {
    if (!saveSchedule()) return;
    const c = getModalColors();
    localStorage.setItem("wc", JSON.stringify(c));
    applyColors(c);
    render();
    document.getElementById("modal").classList.remove("open");
  };

  window.resetSchedule = function() {
    document.getElementById("schedule-start-date").value = toDateInputValue(defaultStart);
    document.getElementById("schedule-groups").value = serializeGroups(defaultGroups);
    refreshStartGroupSelect(defaultStartIdx);
  };

  window.saveColors = function() {
    const c = getModalColors();
    localStorage.setItem("wc", JSON.stringify(c));
    applyColors(c);
    document.getElementById("modal").classList.remove("open");
  };

  window.resetColors = function() {
    localStorage.removeItem("wc");
    applyColors(defaultColors);
    popModal(defaultColors);
  };

  document.getElementById("settingsBtn").addEventListener("click", () => {
    popSchedule();
    popModal(loadColors());
    document.getElementById("modal").classList.add("open");
  });
  document.getElementById("schedule-groups").addEventListener("input", () => {
    refreshStartGroupSelect(Number(document.getElementById("schedule-start-group").value) || 0);
  });
  document.getElementById("modal").addEventListener("click", (e) => {
    if (e.target === e.currentTarget) document.getElementById("modal").classList.remove("open");
  });

  loadSchedule();
  applyColors(loadColors());
  render();
})();
</script>
</body>
</html>
