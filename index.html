<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧹 卫生值日</title>
<style>
  :root {
    --c-bg: #0f0c29;
    --c-card: #ffffff;
    --c-title: #1e1b4b;
    --c-gs: #6366f1;
    --c-gm: #8b5cf6;
    --c-ge: #a855f7;
    --c-ibg: #f8f7ff;
    --c-tbg: #ede9fe;
    --c-tname: #4c1d95;
    --c-subtle: #94a3b8;
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--c-bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,.20), transparent),
      radial-gradient(ellipse 60% 40% at 50% 120%, rgba(168,85,247,.12), transparent);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Card ─────────────────────── */
  .card {
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 32px;
    padding: 32px 24px 28px;
    width: 100%;
    max-width: 400px;
    box-shadow:
      0 4px 6px -1px rgba(0,0,0,.05),
      0 20px 50px -12px rgba(0,0,0,.25),
      0 0 0 1px rgba(255,255,255,.15) inset;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: 32px;
    background: linear-gradient(180deg, rgba(255,255,255,.4) 0%, transparent 60%);
    pointer-events: none;
  }

  /* header */
  .card-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
    position: relative;
    z-index: 2;
  }
  .card-header .icon {
    font-size: 28px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.1));
  }
  .card-header h1 {
    font-size: 20px;
    font-weight: 800;
    color: var(--c-title);
    letter-spacing: 3px;
  }

  /* ── Today hero ───────────────── */
  .today-box {
    position: relative;
    background: linear-gradient(145deg, var(--c-gs), var(--c-gm) 50%, var(--c-ge));
    border-radius: 24px;
    padding: 30px 20px 26px;
    margin-bottom: 20px;
    color: #fff;
    overflow: hidden;
    isolation: isolate;
    box-shadow: 0 8px 32px -4px rgba(99,102,241,.35);
    z-index: 1;
  }
  .today-box::before {
    content: ""; position: absolute;
    top: -50px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,.06);
    border-radius: 50%;
    z-index: -1;
  }
  .today-box::after {
    content: ""; position: absolute;
    bottom: -40px; left: -30px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,.04);
    border-radius: 50%;
    z-index: -1;
  }
  .today-label {
    font-size: 14px; font-weight: 600;
    opacity: .8; letter-spacing: 4px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .today-person {
    font-size: 42px; font-weight: 900;
    letter-spacing: 4px; line-height: 1.25;
    text-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .today-date {
    font-size: 13px; opacity: .55;
    margin-top: 8px; font-weight: 500;
  }

  /* ── List ─────────────────────── */
  .list { margin-top: 4px; position: relative; z-index: 2; }
  .list .row {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
    background: var(--c-ibg);
    transition: transform .15s, box-shadow .15s;
  }
  .list .row:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(0,0,0,.04);
  }
  .list .row .tag {
    width: 44px;
    font-size: 13px;
    font-weight: 600;
    color: var(--c-subtle);
    text-align: left;
    letter-spacing: .5px;
  }
  .list .row .date {
    flex: 1; text-align: center;
    font-size: 13px; color: #b0b0c0;
    font-weight: 500;
  }
  .list .row .names {
    width: 96px; text-align: right;
    font-size: 14px; font-weight: 600;
    color: #555; line-height: 1.5;
  }

  .list .row.today {
    background: linear-gradient(135deg, var(--c-tbg), #f5f3ff);
    box-shadow: 0 2px 12px rgba(124,58,237,.12);
    padding: 15px 16px;
    border: 1px solid rgba(139,92,246,.12);
  }
  .list .row.today .tag { color: #4c1d95; font-weight: 700; font-size: 14px; }
  .list .row.today .date { color: #5b21b6; font-weight: 600; }
  .list .row.today .names { color: #1e1b4b; font-weight: 800; font-size: 15px; }

  /* ── Footer ───────────────────── */
  .footer {
    margin-top: 18px;
    font-size: 11px;
    color: #b0b0c0;
    letter-spacing: 1px;
    position: relative; z-index: 2;
  }
  .badge {
    display: inline-block;
    background: rgba(139,92,246,.08);
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 11px;
    color: #8b8ca0;
    margin-top: 6px;
    font-weight: 500;
    position: relative; z-index: 2;
  }

  /* ── Settings Button ──────────── */
  .settings-btn {
    position: fixed; top: 20px; right: 20px;
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: rgba(255,255,255,.12);
    color: rgba(255,255,255,.8); font-size: 18px;
    cursor: pointer;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: background .2s, transform .2s, color .2s;
  }
  .settings-btn:hover {
    background: rgba(255,255,255,.22);
    transform: scale(1.05);
    color: #fff;
  }

  /* ── Modal ────────────────────── */
  .modal-overlay {
    display: flex;
    align-items: center; justify-content: center;
    position: fixed; inset: 0; padding: 20px;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open {
    opacity: 1; pointer-events: auto;
  }
  .modal {
    background: #fff;
    border-radius: 28px;
    padding: 28px 24px 24px;
    width: 100%; max-width: 380px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,.25);
    transform: translateY(8px);
    transition: transform .25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 {
    font-size: 18px; font-weight: 700;
    color: #1e1b4b; margin-bottom: 20px;
    text-align: center; letter-spacing: 1px;
  }
  .modal .fg { margin-bottom: 10px; }
  .modal .fg label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500; color: #666;
    margin-bottom: 4px;
  }
  .modal .fg label::before {
    content: ""; display: inline-block;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--dot, #ccc);
    flex-shrink: 0;
  }
  .modal .fg input[type="color"] {
    width: 56px; height: 36px;
    border: none; border-radius: 12px;
    padding: 0; cursor: pointer; background: transparent;
  }
  .modal .fg input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .modal .fg input[type="color"]::-webkit-color-swatch {
    border: 2px solid rgba(255,255,255,.8);
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(15,12,41,.16);
  }
  .modal .fg input[type="color"]:focus { outline: 2px solid #8b5cf6; outline-offset: 2px; }
  .color-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .color-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-width: 0;
    padding: 10px 10px 10px 12px;
    border: 1px solid #eeeef6;
    border-radius: 16px;
    background: linear-gradient(180deg, #fff, #fbfbff);
  }
  .color-card span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
    font-weight: 600;
    color: #57576a;
  }
  .modal .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .modal .btn-row button {
    flex: 1; padding: 12px; border: none; border-radius: 14px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .modal .btn-row button:active { transform: scale(.97); }
  .modal .btn-save {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 16px -4px rgba(99,102,241,.4);
  }
  .modal .btn-save:hover { box-shadow: 0 6px 20px -4px rgba(99,102,241,.5); }
  .modal .btn-reset { background: #f0f0f5; color: #666; }
  .modal .btn-reset:hover { background: #e8e8ee; }
  .modal .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #4c1d95;
    margin: 18px 0 10px;
    padding-top: 14px;
    border-top: 1px solid #eeeef6;
  }
  .modal .section-title:first-of-type {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }
  .modal .fg input[type="date"],
  .modal .fg input[type="text"],
  .modal .fg textarea,
  .modal .fg select {
    width: 100%;
    border: 2px solid #e8e8ee;
    border-radius: 10px;
    padding: 10px 12px;
    font: inherit;
    font-size: 13px;
    color: #444;
    background: #fff;
    outline: none;
    transition: border-color .15s;
  }
  .modal .fg textarea {
    min-height: 96px;
    resize: vertical;
    line-height: 1.5;
  }
  .modal .fg input[type="date"]:focus,
  .modal .fg input[type="text"]:focus,
  .modal .fg textarea:focus,
  .modal .fg select:focus {
    border-color: #8b5cf6;
  }
  .modal .hint {
    font-size: 11px;
    color: #9ca3af;
    line-height: 1.5;
    margin-top: -4px;
    margin-bottom: 10px;
  }
  .modal .btn-ghost {
    background: #f8f7ff;
    color: #6d28d9;
    margin-top: 8px;
  }
  .modal .btn-ghost:hover { background: #ede9fe; }

  @media (max-width: 420px) {
    .color-grid { grid-template-columns: 1fr; }
  }

  /* responsive */
  @media (max-width: 420px) {
    .card { padding: 24px 16px 20px; border-radius: 28px; }
    .today-person { font-size: 36px; }
    .list .row { padding: 11px 12px; }
    .list .row .names { width: 84px; }
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --c-title: #e2e0f0;
      --c-ibg: rgba(255,255,255,.04);
      --c-tbg: rgba(139,92,246,.15);
      --c-tname: #c4b5fd;
      --c-subtle: #8888a0;
    }
    body {
      background: #0a0820;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,.12), transparent),
        radial-gradient(ellipse 60% 40% at 50% 120%, rgba(168,85,247,.06), transparent);
    }
    .card { background: rgba(24,22,44,.88); }
    .list .row { background: rgba(255,255,255,.03); }
    .list .row.today { background: rgba(139,92,246,.12); }
    .list .row.today .tag,
    .list .row.today .date { color: #c4b5fd; }
    .list .row.today .names { color: #e8e4ff; }
    .list .row .date { color: #6a6a80; }
    .list .row .names { color: #c0c0d0; }
    .footer, .badge { color: #6a6a80; }
    .modal { background: #1e1c30; }
    .modal h2 { color: #e8e4ff; }
    .modal .fg label { color: #a0a0b0; }
    .modal .fg input[type="color"] { background: transparent; }
    .color-card {
      background: rgba(255,255,255,.04);
      border-color: #3a3850;
    }
    .color-card span { color: #c7c7d8; }
    .modal .fg input[type="date"],
    .modal .fg input[type="text"],
    .modal .fg textarea,
    .modal .fg select {
      background: #2a2840;
      border-color: #3a3850;
      color: #e5e7eb;
    }
    .modal .section-title {
      color: #c4b5fd;
      border-top-color: #3a3850;
    }
    .modal .hint { color: #6a6a80; }
    .modal .btn-ghost { background: #2a2840; color: #c4b5fd; }
    .modal .btn-ghost:hover { background: #35324d; }
    .modal .btn-reset { background: #2a2840; color: #a0a0b0; }
  }
</style>
</head>
<body>

<button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>⚙️ 设置</h2>
    <div class="section-title">排班设置</div>
    <div class="fg"><label style="--dot:#6366f1">起始日期</label><input type="date" id="schedule-start-date"></div>
    <div class="fg"><label style="--dot:#8b5cf6">当天值日组</label><select id="schedule-start-group"></select></div>
    <div class="fg"><label style="--dot:#a855f7">值日人员</label><textarea id="schedule-groups" placeholder="每行一组，两个人用逗号分隔&#10;康戬泰, 甘亦伦&#10;刘云腾, 刘峻承"></textarea></div>
    <div class="hint">每行代表一天轮到的一组，支持逗号、顿号、空格分隔；至少填写一组。</div>
    <button class="btn-save btn-ghost" onclick="resetSchedule()">↩ 恢复默认排班</button>

    <div class="section-title">颜色设置</div>
    <div class="color-grid">
      <label class="color-card"><span>背景色</span><input type="color" id="cl-bg"></label>
      <label class="color-card"><span>卡片底色</span><input type="color" id="cl-card"></label>
      <label class="color-card"><span>标题颜色</span><input type="color" id="cl-title"></label>
      <label class="color-card"><span>渐变起始</span><input type="color" id="cl-gs"></label>
      <label class="color-card"><span>渐变中间</span><input type="color" id="cl-gm"></label>
      <label class="color-card"><span>渐变结束</span><input type="color" id="cl-ge"></label>
      <label class="color-card"><span>列表背景</span><input type="color" id="cl-ibg"></label>
      <label class="color-card"><span>今日高亮</span><input type="color" id="cl-tbg"></label>
    </div>
    <div class="btn-row">
      <button class="btn-reset" onclick="resetColors()">↩ 默认颜色</button>
      <button class="btn-save" onclick="saveSettings()">✓ 保存全部</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header"><span class="icon">🧹</span><h1>卫生值日</h1></div>
  <div class="today-box" id="todayBox"></div>
  <div class="list" id="list"></div>
  <div class="footer">🔁 4组循环 · 最后两组轮完重新开始</div>
  <div class="badge" id="badge"></div>
</div>

<script>
(function() {
  let groups = [
    { label: "第1组", people: ["康戬泰", "甘亦伦"] },
    { label: "第2组", people: ["刘云腾", "刘峻承"] },
    { label: "第3组", people: ["杜春旺", "周诣"] },
    { label: "第4组", people: ["刘洋", "刘天洋"] }
  ];
  let start = new Date(2026,5,12);
  let startIdx = 2;
  const defaultGroups = groups.map(g => ({ label: g.label, people: [...g.people] }));
  const defaultStart = new Date(start);
  const defaultStartIdx = startIdx;
  const SCHEDULE_KEY = "ws_schedule";
  const today = new Date();
  today.setHours(0,0,0,0);

  const DAY_NAMES = ['日','一','二','三','四','五','六'];
  const DAYS = [
    { label: "前天", offset: -2 },
    { label: "昨天", offset: -1 },
    { label: "今天", offset: 0 },
    { label: "明天", offset: 1 },
    { label: "后天", offset: 2 }
  ];

  function getGroup(offset) {
    const d = new Date(today);
    d.setDate(d.getDate() + offset);
    const diff = Math.floor((d - start) / 86400000);
    const idx = ((startIdx + diff) % groups.length + groups.length) % groups.length;
    return { date: d, group: groups[idx] };
  }

  function formatDate(d) {
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${DAY_NAMES[d.getDay()]}`;
  }

  function toDateInputValue(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function parseDateInput(s) {
    const parts = s.split("-").map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function cloneGroups(list) {
    return list.map((g, i) => ({ label: g.label || `第${i + 1}组`, people: [...g.people] }));
  }

  function serializeGroups(list) {
    return list.map(g => g.people.join("、")).join("\n");
  }

  function parseGroups(text) {
    return text.split("\n")
      .map(line => line.trim())
      .filter(Boolean)
      .map((line, i) => ({
        label: `第${i + 1}组`,
        people: line.split(/[、,，\s]+/).map(name => name.trim()).filter(Boolean)
      }))
      .filter(g => g.people.length > 0);
  }

  function loadSchedule() {
    try {
      const saved = localStorage.getItem(SCHEDULE_KEY);
      if (!saved) return;
      const cfg = JSON.parse(saved);
      const savedGroups = Array.isArray(cfg.groups) ? parseGroups(serializeGroups(cfg.groups)) : [];
      if (savedGroups.length > 0 && cfg.startDate) {
        groups = savedGroups;
        start = parseDateInput(cfg.startDate);
        startIdx = Math.min(Math.max(Number(cfg.startIdx) || 0, 0), groups.length - 1);
      }
    } catch(e) {}
  }

  function render() {
    const r0 = getGroup(0);
    document.getElementById("todayBox").innerHTML =
      `<div class="today-label">🧹 今天轮到</div>` +
      `<div class="today-person">${r0.group.people[0]}<br>${r0.group.people[1]}</div>` +
      `<div class="today-date">${formatDate(r0.date)}</div>`;

    const html = DAYS.map(d => {
      const r = getGroup(d.offset);
      const cls = d.offset === 0 ? "row today" : "row";
      return `<div class="${cls}">
        <span class="tag">${d.label}</span>
        <span class="date">${r.date.getMonth()+1}月${r.date.getDate()}日 周${DAY_NAMES[r.date.getDay()]}</span>
        <span class="names">${r.group.people[0]}<br>${r.group.people[1]}</span>
      </div>`;
    }).join("");

    document.getElementById("list").innerHTML = html;
    document.getElementById("badge").textContent =
      `🕐 ${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
    document.querySelector(".footer").textContent =
      `🔁 ${groups.length}组循环 · 轮完${groups[groups.length - 1].label}回${groups[0].label}`;
  }

  const defaultColors = {
    bg: "#0f0c29", card: "#ffffff", title: "#1e1b4b",
    gs: "#6366f1", gm: "#8b5cf6", ge: "#a855f7",
    ibg: "#f8f7ff", tbg: "#ede9fe"
  };

  const CSS_VARS = ["bg","card","title","gs","gm","ge","ibg","tbg"];
  const INPUT_IDS  = ["cl-bg","cl-card","cl-title","cl-gs","cl-gm","cl-ge","cl-ibg","cl-tbg"];

  function loadColors() {
    try {
      const s = localStorage.getItem("wc");
      if (s) return JSON.parse(s);
    } catch(e) {}
    return { ...defaultColors };
  }

  function applyColors(c) {
    const r = document.documentElement;
    r.style.setProperty("--c-bg", c.bg);
    r.style.setProperty("--c-card", c.card);
    r.style.setProperty("--c-title", c.title);
    r.style.setProperty("--c-gs", c.gs);
    r.style.setProperty("--c-gm", c.gm);
    r.style.setProperty("--c-ge", c.ge);
    r.style.setProperty("--c-ibg", c.ibg);
    r.style.setProperty("--c-tbg", c.tbg);
  }

  function popModal(c) {
    for (let i = 0; i < CSS_VARS.length; i++) {
      document.getElementById(INPUT_IDS[i]).value = c[CSS_VARS[i]];
    }
  }

  function getModalColors() {
    const c = {};
    for (let i = 0; i < CSS_VARS.length; i++) {
      c[CSS_VARS[i]] = document.getElementById(INPUT_IDS[i]).value;
    }
    return c;
  }

  function refreshStartGroupSelect(selected) {
    const sel = document.getElementById("schedule-start-group");
    const parsed = parseGroups(document.getElementById("schedule-groups").value);
    const source = parsed.length ? parsed : groups;
    sel.innerHTML = source.map((g, i) =>
      `<option value="${i}">${g.label}：${g.people.join("、")}</option>`
    ).join("");
    sel.value = Math.min(selected ?? startIdx, Math.max(source.length - 1, 0));
  }

  function popSchedule() {
    document.getElementById("schedule-start-date").value = toDateInputValue(start);
    document.getElementById("schedule-groups").value = serializeGroups(groups);
    refreshStartGroupSelect(startIdx);
  }

  function saveSchedule() {
    const nextGroups = parseGroups(document.getElementById("schedule-groups").value);
    if (nextGroups.length === 0) {
      alert("至少填写一组值日人员");
      return false;
    }
    const dateValue = document.getElementById("schedule-start-date").value;
    if (!dateValue) {
      alert("请选择起始日期");
      return false;
    }
    groups = nextGroups;
    start = parseDateInput(dateValue);
    startIdx = Math.min(Number(document.getElementById("schedule-start-group").value) || 0, groups.length - 1);
    localStorage.setItem(SCHEDULE_KEY, JSON.stringify({
      groups: cloneGroups(groups),
      startDate: dateValue,
      startIdx
    }));
    return true;
  }

  window.saveSettings = function() {
    if (!saveSchedule()) return;
    const c = getModalColors();
    localStorage.setItem("wc", JSON.stringify(c));
    applyColors(c);
    render();
    document.getElementById("modal").classList.remove("open");
  };

  window.resetSchedule = function() {
    groups = cloneGroups(defaultGroups);
    start = new Date(defaultStart);
    startIdx = defaultStartIdx;
    localStorage.removeItem(SCHEDULE_KEY);
    popSchedule();
    render();
  };

  window.saveColors = function() {
    const c = getModalColors();
    localStorage.setItem("wc", JSON.stringify(c));
    applyColors(c);
    document.getElementById("modal").classList.remove("open");
  };

  window.resetColors = function() {
    localStorage.removeItem("wc");
    applyColors(defaultColors);
    popModal(defaultColors);
    document.getElementById("modal").classList.remove("open");
  };

  document.getElementById("settingsBtn").addEventListener("click", () => {
    popSchedule();
    popModal(loadColors());
    document.getElementById("modal").classList.add("open");
  });
  document.getElementById("schedule-groups").addEventListener("input", () => {
    refreshStartGroupSelect(Number(document.getElementById("schedule-start-group").value) || 0);
  });
  document.getElementById("modal").addEventListener("click", (e) => {
    if (e.target === e.currentTarget) document.getElementById("modal").classList.remove("open");
  });

  loadSchedule();
  applyColors(loadColors());
  render();
})();
</script>
</body>
</html>
